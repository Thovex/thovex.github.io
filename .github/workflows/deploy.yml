# Deploy static site to GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Sync Void Resonance submodule
        env:
          SUBMODULE_PAT: ${{ secrets.SUBMODULE_PAT }}
        run: |
          if [ -z "$SUBMODULE_PAT" ]; then
            echo "::error::SUBMODULE_PAT is required to fetch apps/voidresonance"
            exit 1
          fi
          case "$SUBMODULE_PAT" in
            *$'\n'*|*$'\r'*)
              echo "::error::SUBMODULE_PAT must not contain newlines"
              exit 1
              ;;
          esac

          credentials_file="$(mktemp)"
          cleanup() {
            git config --global --unset credential.helper || true
            rm -f "$credentials_file"
          }
          trap cleanup EXIT
          git config --global credential.helper "store --file=$credentials_file"
          printf 'protocol=https\nhost=github.com\nusername=x-access-token\npassword=%s\n\n' "$SUBMODULE_PAT" | git credential approve
          git submodule sync -- apps/voidresonance
          git submodule update --init --remote --depth=1 apps/voidresonance

      - name: Push submodule update
        if: github.actor != 'github-actions[bot]'
        run: |
          if git diff --quiet --exit-code -- apps/voidresonance; then
            echo "Submodule already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/voidresonance
          git commit -m "chore: update voidresonance submodule"
          git push origin HEAD:${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/voidresonance/package-lock.json

      - name: Install Void Resonance dependencies
        working-directory: apps/voidresonance
        run: npm ci

      - name: Build Void Resonance
        working-directory: apps/voidresonance
        run: npm run build

      - name: Stage site artifact
        run: |
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='apps' \
            --exclude='_site' \
            ./ ./_site/
          mkdir -p ./_site/voidresonance
          rsync -av --delete ./apps/voidresonance/dist/ ./_site/voidresonance/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
