<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Crypto Capitalist</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">

    <style>
        /* Adjust Unity container size */
        #unity-container {
            width: 100%;
            height: calc(100vh - 100px); /* Subtract some space for the Telegram data */
        }

        /* Position the user data at the bottom */
        #userData {
            width: 100%;
            background-color: #f0f0f0;
            position: fixed;
            bottom: 0;
            left: 0;
            padding: 10px;
            text-align: center;
            font-family: Arial, sans-serif;
            box-shadow: 0px -2px 5px rgba(0, 0, 0, 0.2);
        }

        /* General page styling */
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        h1 {
            display: none; /* Hide title to maximize space for the game */
        }
    </style>
</head>
<body>
    <!-- Unity WebGL game container -->
    <div id="unity-container" class="unity-desktop">
        <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
        <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
        <div id="unity-warning"> </div>
        <div id="unity-footer">
            <div id="unity-webgl-logo"></div>
            <div id="unity-fullscreen-button"></div>
            <div id="unity-build-title">Crypto Capitalist</div>
        </div>
    </div>

    <!-- Telegram user data container -->
    <pre id="userData"></pre>

    <!-- Telegram Game API -->
    <script src="https://telegram.org/js/games.js"></script>

    <script>
        // Wait for the SDK to load and initialize
        TelegramGameProxy.init({
            onReady: function() {
                console.log('Game is ready!');

                // Access user data
                const user = TelegramGameProxy.initParams.user;

                // Display the user data in the HTML
                const userDataElement = document.getElementById('userData');
                userDataElement.textContent = `User ID: ${user.id}, First Name: ${user.first_name}, Username: ${user.username}`;
            },
            onError: function(error) {
                console.error('Error:', error);
            }
        });

        // Unity game setup
        var container = document.querySelector("#unity-container");
        var canvas = document.querySelector("#unity-canvas");
        var loadingBar = document.querySelector("#unity-loading-bar");
        var progressBarFull = document.querySelector("#unity-progress-bar-full");
        var fullscreenButton = document.querySelector("#unity-fullscreen-button");
        var warningBanner = document.querySelector("#unity-warning");

        function unityShowBanner(msg, type) {
            function updateBannerVisibility() {
                warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
            }
            var div = document.createElement('div');
            div.innerHTML = msg;
            warningBanner.appendChild(div);
            if (type == 'error') div.style = 'background: red; padding: 10px;';
            else {
                if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
                setTimeout(function() {
                    warningBanner.removeChild(div);
                    updateBannerVisibility();
                }, 5000);
            }
            updateBannerVisibility();
        }

        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/Build.loader.js";
        var config = {
            dataUrl: buildUrl + "/Build.data.unityweb",
            frameworkUrl: buildUrl + "/Build.framework.js.unityweb",
            codeUrl: buildUrl + "/Build.wasm.unityweb",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "DefaultCompany",
            productName: "Crypto Capitalist",
            productVersion: "1.0",
            showBanner: unityShowBanner,
        };

        loadingBar.style.display = "block";

        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
                progressBarFull.style.width = 100 * progress + "%";
            }).then((unityInstance) => {
                loadingBar.style.display = "none";
                fullscreenButton.onclick = () => {
                    unityInstance.SetFullscreen(1);
                };
            }).catch((message) => {
                alert(message);
            });
        };
        document.body.appendChild(script);
    </script>
</body>
</html>
