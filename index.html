<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON Transaction Example</title>
    <script src="https://cdn.jsdelivr.net/npm/tonweb@0.0.45/dist/tonweb.js"></script> <!-- TonWeb library -->
</head>
<body>
    <button id="sendTonButton">Send TON</button>
    <script type="text/javascript">
        // Initialize TonWeb
        const tonweb = new TonWeb();

        // Function to create a Tonkeeper deeplink for a transaction
        function sendTonTransaction() {
            const recipientAddress = "UQADqWNLNKlkbYaxuTU5pBeRGCsGR04E6XWMx1STzYn0pL_T"; // Replace with your recipient address
            const amountInNanoTon = TonWeb.utils.toNano(1); // 1 TON in nanoton (1 TON = 1e9 nanoton)
            const comment = "Payment for Testing";

            // Create a Tonkeeper deeplink URL
            const deeplinkUrl = `ton://transfer/${recipientAddress}?amount=${amountInNanoTon}&text=${encodeURIComponent(comment)}`;

            // Open the deeplink (this will open the Tonkeeper wallet app)
            window.location.href = deeplinkUrl;

            // Optionally, handle callback here (if using TonConnect or backend verification)
            console.log("Redirecting to Tonkeeper for transaction...");
        }

        // Attach the function to the button
        document.getElementById("sendTonButton").addEventListener("click", sendTonTransaction);
    </script>
</body>
</html>
