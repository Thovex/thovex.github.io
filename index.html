<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Clicker Game</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        canvas {
            display: block;
        }
    </style>
    <script src="https://telegram.org/js/games.js"></script>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let score = 0;
        let box = {};

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawBox();
        }

        function drawBox() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'red';
            ctx.fillRect(box.x, box.y, box.size, box.size);
            ctx.fillStyle = 'black';
            ctx.font = '20px Arial';
            ctx.fillText(`Score: ${score}`, 10, 30);
        }

        function spawnBox() {
            box = {
                x: Math.random() * (canvas.width - 50),
                y: Math.random() * (canvas.height - 50),
                size: 50
            };
            drawBox();
        }

        function handleClick(event) {
            const rect = canvas.getBoundingClientRect();
            const clickX = event.clientX - rect.left;
            const clickY = event.clientY - rect.top;

            if (clickX >= box.x && clickX <= box.x + box.size &&
                clickY >= box.y && clickY <= box.y + box.size) {
                score++;
                spawnBox();
                sendScoreToTelegram();
            }
        }

        function sendScoreToTelegram() {
            if (window.TelegramGameProxy) {
                TelegramGameProxy.postEvent("score", score);
                console.log("Score sent to Telegram:", score);
                if (score === 10) {
                    TelegramGameProxy.shareScore();
                    console.log("High score shared with Telegram");
                }
            } else {
                console.log("TelegramGameProxy not available");
            }
        }

        window.addEventListener('resize', resizeCanvas);
        canvas.addEventListener('click', handleClick);

        resizeCanvas();
        spawnBox();
    </script>
</body>
</html>
