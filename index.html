<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Clicker Game</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
        }
        #status {
            position: absolute;
            top: 10px;
            left: 10px;
            color: green;
            font-size: 18px;
        }
    </style>
    <script src="https://telegram.org/js/games.js"></script>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="status">Checking Telegram connection...</div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusElement = document.getElementById('status');
        let score = 0;
        let box = {};

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawBox();
        }

        function drawBox() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'red';
            ctx.fillRect(box.x, box.y, box.size, box.size);
            ctx.fillStyle = 'black';
            ctx.font = '20px Arial';
            ctx.fillText(`Score: ${score}`, 10, 30);
        }

        function spawnBox() {
            box = {
                x: Math.random() * (canvas.width - 50),
                y: Math.random() * (canvas.height - 50),
                size: 50
            };
            drawBox();
        }

        function handleClick(event) {
            const rect = canvas.getBoundingClientRect();
            const clickX = event.clientX - rect.left;
            const clickY = event.clientY - rect.top;

            if (clickX >= box.x && clickX <= box.x + box.size &&
                clickY >= box.y && clickY <= box.y + box.size) {
                score++;
                updateTelegramScore(score); // Send the score to Telegram
                spawnBox();
            }
        }

        window.addEventListener('resize', resizeCanvas);
        canvas.addEventListener('click', handleClick);

        resizeCanvas();
        spawnBox();

        // Function to check the Telegram connection and update status text
        function checkTelegramConnection() {
            if (window.TelegramGameProxy) {
                statusElement.textContent = "Connected to Telegram!";
                statusElement.style.color = "green";
            } else {
                statusElement.textContent = "Not connected to Telegram!";
                statusElement.style.color = "red";
            }
        }

        // Function to send the score using the Telegram API
        function updateTelegramScore(score) {
            if (window.TelegramGameProxy) {
                TelegramGameProxy.setScore(score, function(success, response) {
                    if (success) {
                        console.log("Score successfully sent to Telegram!");
                    } else {
                        console.error("Failed to send score: ", response);
                    }
                });
            } else {
                console.error("Telegram Game API not available.");
            }
        }

        // Check connection status when the game starts
        checkTelegramConnection();
    </script>
</body>
</html>
