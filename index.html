<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON Testnet Transaction Example</title>
    <script src="https://cdn.jsdelivr.net/npm/tonweb@0.0.45/dist/tonweb.js"></script> <!-- TonWeb library -->
</head>
<body>
    <button id="connectWalletButton">Connect Wallet</button>
    <button id="sendTonButton" disabled>Send TON on Testnet</button> <!-- Disabled by default until wallet is connected -->

    <!-- Using the ES Module syntax -->
    <script type="module">
        import { TonConnect } from "https://cdn.jsdelivr.net/npm/@tonconnect/sdk@latest/dist/tonconnect-sdk.es.js";

        // Initialize TonConnect
        const tonConnect = new TonConnect({
            manifestUrl: 'https://jessevanvliet.xyz/tonconnect-manifest.json' // Replace with the actual URL of your tonconnect-manifest.json file
        });

        // Function to connect Tonkeeper wallet using TonConnect
        async function connectWallet() {
            try {
                // Initiate wallet connection
                await tonConnect.connect({ wallets: ['tonkeeper'] });
                console.log("Wallet connected successfully!");

                // Enable the "Send TON" button once wallet is connected
                document.getElementById("sendTonButton").disabled = false;

                // Get connected wallet information
                const walletInfo = tonConnect.getConnectedWallet();
                console.log("Connected Wallet Info:", walletInfo);

                alert("Wallet connected! Address: " + walletInfo.account.address);
            } catch (error) {
                console.error("Failed to connect wallet:", error);
                alert("Failed to connect wallet: " + error.message);
            }
        }

        // Function to send a TON transaction using TonConnect
        async function sendTonTransaction() {
            try {
                const recipientAddress = "UQADqWNLNKlkbYaxuTU5pBeRGCsGR04E6XWMx1STzYn0pL_T"; // Replace with your recipient address
                const amountInNanoTon = TonWeb.utils.toNano(1).toString(); // 1 TON in nanoton (1 TON = 1e9 nanoton)
                const comment = "Payment for Testnet Transaction";

                // Create transaction object
                const transaction = {
                    validUntil: Date.now() + 1000 * 60 * 5, // Transaction valid for 5 minutes
                    messages: [{
                        address: recipientAddress,
                        amount: amountInNanoTon,
                        payload: new TextEncoder().encode(comment).toString() // Convert comment to payload string
                    }]
                };

                // Send transaction using TonConnect
                const response = await tonConnect.sendTransaction(transaction);

                console.log("Transaction response:", response);
                alert("Transaction sent successfully!");
            } catch (error) {
                console.error("Transaction failed:", error);
                alert("Transaction failed: " + error.message);
            }
        }

        // Attach functions to buttons
        document.getElementById("connectWalletButton").addEventListener("click", connectWallet);
        document.getElementById("sendTonButton").addEventListener("click", sendTonTransaction);
    </script>
</body>
</html>
