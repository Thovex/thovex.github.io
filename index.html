<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON Testnet Transaction Example</title>
    <script src="https://cdn.jsdelivr.net/npm/tonweb@0.0.45/dist/tonweb.js"></script>
    <script src="https://unpkg.com/@tonconnect/sdk@latest/dist/tonconnect-sdk.min.js"></script> <!-- TonConnect SDK -->
</head>

<body>
    <button id="connectWalletButton">Connect Wallet</button>
    <button id="sendTonButton" disabled>Send TON on Testnet</button> <!-- Disabled until wallet connects -->

    <script>
        const tonConnect = new TonConnectSDK.TonConnect({
            manifestUrl: 'https://jessevanvliet.xyz/tonconnect-manifest.json'
        });

        // Function to connect Tonkeeper wallet using TonConnect
        async function connectWallet() {
            try {
                await tonConnect.connect({
                    universalLink: 'https://app.tonkeeper.com/ton-connect',
                    bridgeUrl: 'https://bridge.tonapi.io/bridge'
                });
                console.log("Wallet connection initiated.");

                // Listen for status changes to capture wallet information
                tonConnect.onStatusChange((walletInfo) => {
                    if (walletInfo) {
                        console.log("Wallet connected successfully!", walletInfo);
                        document.getElementById("sendTonButton").disabled = false;
                        alert("Wallet connected! Address: " + walletInfo.account.address);
                    } else {
                        console.error("Failed to get wallet information.");
                    }
                });
            } catch (error) {
                console.error("Failed to connect wallet:", error);
                alert("Failed to connect wallet: " + error.message);
            }
        }


        // Function to send a TON transaction using TonConnect
        async function sendTonTransaction() {
            try {
                const recipientAddress = "UQADqWNLNKlkbYaxuTU5pBeRGCsGR04E6XWMx1STzYn0pL_T"; // Replace with your recipient address
                const amountInNanoTon = TonWeb.utils.toNano(1).toString(); // 1 TON in nanoton (1 TON = 1e9 nanoton)
                const comment = "Payment for Testnet Transaction";

                const transaction = {
                    validUntil: Math.floor(Date.now() / 1000) + 60 * 5,
                    messages: [{
                        address: recipientAddress,
                        amount: amountInNanoTon,
                        payload: new TextEncoder().encode(comment)
                    }]
                };

                const response = await tonConnect.sendTransaction(transaction);
                console.log("Transaction response:", response);
                alert("Transaction sent successfully!");
            } catch (error) {
                console.error("Transaction failed:", error);
                alert("Transaction failed: " + error.message);
            }
        }

        // Attach functions to buttons
        document.getElementById("connectWalletButton").addEventListener("click", connectWallet);
        document.getElementById("sendTonButton").addEventListener("click", sendTonTransaction);
    </script>
</body>

</html>
