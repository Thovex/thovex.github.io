<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Clicker Game</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
        }
        #status {
            position: absolute;
            top: 10px;
            left: 10px;
            color: green;
            font-size: 18px;
        }
        #connectButton {
            position: absolute;
            top: 50px;
            left: 10px;
            font-size: 16px;
        }
        #disconnectButton {
            position: absolute;
            top: 90px;
            left: 10px;
            font-size: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="status">Not connected</div>
    <button id="connectButton">Connect Wallet</button>
    <button id="disconnectButton">Disconnect Wallet</button>

    <script src="https://unpkg.com/@tonconnect/sdk@latest/dist/tonconnect.umd.js"></script>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let score = 0;
        let box = {};
        let walletAddress = null;

        const statusElement = document.getElementById('status');
        const connectButton = document.getElementById('connectButton');
        const disconnectButton = document.getElementById('disconnectButton');

        const tonConnect = new TonConnect.TonConnect();

        async function connectWallet() {
            try {
                await tonConnect.connect();
                const account = await tonConnect.getAccounts()[0];
                walletAddress = account.address;
                statusElement.textContent = `Connected: ${walletAddress}`;
                connectButton.style.display = 'none';
                disconnectButton.style.display = 'block';
            } catch (error) {
                console.error('Error connecting wallet:', error);
            }
        }

        async function disconnectWallet() {
            tonConnect.disconnect();
            walletAddress = null;
            statusElement.textContent = 'Not connected';
            connectButton.style.display = 'block';
            disconnectButton.style.display = 'none';
        }

        connectButton.addEventListener('click', connectWallet);
        disconnectButton.addEventListener('click', disconnectWallet);

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawBox();
        }

        function drawBox() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'red';
            ctx.fillRect(box.x, box.y, box.size, box.size);
            ctx.fillStyle = 'black';
            ctx.font = '20px Arial';
            ctx.fillText(`Score: ${score}`, 10, 30);
            if (walletAddress) {
                ctx.fillText(`Wallet: ${walletAddress}`, 10, 60);
            }
        }

        function spawnBox() {
            box = {
                x: Math.random() * (canvas.width - 50),
                y: Math.random() * (canvas.height - 50),
                size: 50
            };
            drawBox();
        }

        function handleClick(event) {
            const rect = canvas.getBoundingClientRect();
            const clickX = event.clientX - rect.left;
            const clickY = event.clientY - rect.top;

            if (clickX >= box.x && clickX <= box.x + box.size &&
                clickY >= box.y && clickY <= box.y + box.size) {
                score++;
                spawnBox();
            }
        }

        window.addEventListener('resize', resizeCanvas);
        canvas.addEventListener('click', handleClick);

        resizeCanvas();
        spawnBox();

    </script>

</body>
</html>
