<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project | Jesse van Vliet</title>
    <meta name="description" content="Project details by Jesse van Vliet, Game Programmer">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="analytics.js"></script>
</head>
<body>
    <div id="nav-placeholder"></div>

    <!-- Project Hero (populated by JS) -->
    <section class="project-hero" id="projectHero">
        <div class="project-hero-bg" id="heroBg"></div>
        <div class="project-hero-content" id="heroContent"></div>
    </section>

    <!-- Work Section -->
    <section class="project-work-section" id="workSection" style="display:none;">
        <div class="project-work-inner">
            <h2 class="section-title" data-reveal>Contributions</h2>
            <p class="project-work-note" data-reveal>Only features I am directly involved with are listed.</p>
            <div class="work-grid" id="workGrid"></div>
        </div>
    </section>

    <!-- Media Section -->
    <section class="project-media-section" id="mediaSection" style="display:none;">
        <div class="project-media-inner">
            <h2 class="section-title" data-reveal style="margin-bottom: 2rem;">Media</h2>
            <div class="media-grid" id="mediaGrid"></div>
        </div>
    </section>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">&times;</button>
        <img id="lightboxImg" src="" alt="">
    </div>

    <div id="footer-placeholder"></div>

    <script src="components.js"></script>
    <script src="project_script.js"></script>
</body>
</html>
